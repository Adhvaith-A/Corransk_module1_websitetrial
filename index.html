<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adhvaith Anand</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Source+Serif+4:ital,wght@1,400;1,500&display=swap');
    
    :root { --radius: 1rem; }
    body { background-color: black; margin: 0; }
    .font-poppins { font-family: 'Poppins', sans-serif; }
    .font-serif { font-family: 'Source Serif 4', serif; }

    /* Liquid Glass Base */
    .liquid-glass {
      background: rgba(255, 255, 255, 0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
      background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%, transparent 40%, transparent 60%, rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }

    /* Liquid Glass Strong */
    .liquid-glass-strong {
      background: rgba(255, 255, 255, 0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      box-shadow: 4px 4px 4px rgba(0, 0, 0, 0.05), inset 0 1px 1px rgba(255, 255, 255, 0.15);
      position: relative;
    }
    .liquid-glass-strong::before {
      content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
      background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 20%, transparent 40%, transparent 60%, rgba(255,255,255,0.2) 80%, rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }
  </style>
</head>
<body class="font-poppins text-white selection:bg-white/20">
  <main class="relative min-h-screen w-full overflow-hidden flex">
    
    <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover z-0">
      <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260315_073750_51473149-4350-4920-ae24-c8214286f323.mp4" type="video/mp4" />
    </video>

    <div class="relative z-10 flex w-full h-screen">
      
      <section class="relative w-full lg:w-[52%] h-full p-4 lg:p-6 flex flex-col">
        <div class="absolute inset-4 lg:inset-6 rounded-3xl liquid-glass-strong -z-10"></div>

        <nav class="flex justify-between items-center px-4 py-4 lg:px-8 lg:py-6">
          <div class="flex items-center gap-3 cursor-pointer hover:scale-105 transition-transform active:scale-95">
            <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center overflow-hidden relative">
              <div class="w-4 h-4 rounded-full bg-black/80 absolute"></div>
            </div>
            <span class="font-semibold text-2xl tracking-tighter text-white">bloom</span>
          </div>
          <button class="liquid-glass rounded-full px-5 py-2.5 flex items-center gap-2 hover:scale-105 transition-transform active:scale-95 text-white/80 hover:text-white">
            <span class="text-sm font-medium">Menu</span>
            <i data-lucide="menu" class="w-4 h-4"></i>
          </button>
        </nav>

        <div class="flex-1 flex flex-col items-center justify-center text-center px-6 mt-8">
          <div class="w-20 h-20 rounded-full liquid-glass mb-8 flex items-center justify-center">
            <div class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-md"></div>
          </div>
          <h1 class="text-6xl lg:text-7xl font-medium tracking-[-0.05em] text-white leading-[1.1]">
            Innovating the <br />
            <em class="font-serif italic text-white/80 font-normal">spirit of bloom</em> AI
          </h1>
          <button class="mt-10 liquid-glass-strong rounded-full px-8 py-3.5 flex items-center gap-4 hover:scale-105 transition-transform active:scale-95">
            <span class="text-sm font-medium">Explore Now</span>
            <div class="w-7 h-7 rounded-full bg-white/15 flex items-center justify-center">
              <i data-lucide="download" class="w-3.5 h-3.5"></i>
            </div>
          </button>

          <div class="flex flex-wrap items-center justify-center gap-3 mt-8">
            <button class="liquid-glass rounded-full px-5 py-2 text-xs text-white/80 hover:scale-105 transition-transform active:scale-95 hover:text-white">Artistic Gallery</button>
            <button class="liquid-glass rounded-full px-5 py-2 text-xs text-white/80 hover:scale-105 transition-transform active:scale-95 hover:text-white">AI Generation</button>
            <button class="liquid-glass rounded-full px-5 py-2 text-xs text-white/80 hover:scale-105 transition-transform active:scale-95 hover:text-white">3D Structures</button>
          </div>
        </div>

        <div class="mt-auto px-8 pb-8 flex flex-col items-center text-center">
          <span class="text-xs tracking-widest uppercase text-white/50 mb-3 block">Visionary Design</span>
          <p class="text-lg lg:text-xl text-white/90 mb-6">"We imagined a <em class="font-serif italic text-white/70">realm</em> with no ending."</p>
          <div class="flex items-center gap-4 w-full max-w-md opacity-60">
            <div class="h-[1px] bg-white/30 flex-1"></div>
            <span class="text-[10px] tracking-widest uppercase text-white">Marcus Aurelio</span>
            <div class="h-[1px] bg-white/30 flex-1"></div>
          </div>
        </div>
      </section>

      <section class="hidden lg:flex w-[48%] relative flex-col p-6 h-full">
        <div class="flex justify-between items-start">
          <div class="liquid-glass rounded-full px-5 py-3 flex items-center gap-5">
            <a href="#" class="text-white/60 hover:text-white transition-colors hover:scale-105 active:scale-95"><i data-lucide="twitter" class="w-4 h-4"></i></a>
            <a href="#" class="text-white/60 hover:text-white transition-colors hover:scale-105 active:scale-95"><i data-lucide="linkedin" class="w-4 h-4"></i></a>
            <a href="#" class="text-white/60 hover:text-white transition-colors hover:scale-105 active:scale-95"><i data-lucide="instagram" class="w-4 h-4"></i></a>
            <div class="w-[1px] h-4 bg-white/20 mx-1"></div>
            <button class="text-white/80 hover:text-white transition-colors hover:scale-105 active:scale-95"><i data-lucide="arrow-right" class="w-4 h-4"></i></button>
          </div>
          <button class="liquid-glass w-12 h-12 rounded-full flex items-center justify-center hover:scale-105 transition-transform active:scale-95">
            <i data-lucide="sparkles" class="w-5 h-5 text-white/80"></i>
          </button>
        </div>

        <div class="liquid-glass rounded-3xl w-56 p-5 mt-6 self-end hover:scale-105 transition-transform cursor-pointer">
          <h3 class="text-sm font-medium text-white mb-1">Enter our ecosystem</h3>
          <p class="text-xs text-white/50 leading-relaxed">Connect with digital botanists and AI artists worldwide.</p>
        </div>

        <div class="mt-auto liquid-glass rounded-[2.5rem] p-5 flex flex-col gap-4 w-full max-w-lg mx-auto xl:mr-0">
          <div class="flex gap-4">
            <div class="liquid-glass rounded-3xl p-5 flex-1 hover:scale-105 transition-transform cursor-pointer group">
              <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center mb-3">
                <i data-lucide="wand-2" class="w-4 h-4 text-white/80 group-hover:text-white transition-colors"></i>
              </div>
              <h4 class="text-sm font-medium text-white/90">Processing</h4>
            </div>
            <div class="liquid-glass rounded-3xl p-5 flex-1 hover:scale-105 transition-transform cursor-pointer group">
              <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center mb-3">
                <i data-lucide="book-open" class="w-4 h-4 text-white/80 group-hover:text-white transition-colors"></i>
              </div>
              <h4 class="text-sm font-medium text-white/90">Growth Archive</h4>
            </div>
          </div>

          <div class="liquid-glass rounded-3xl p-4 flex items-center gap-4 hover:scale-105 transition-transform cursor-pointer group">
            <img src="https://images.unsplash.com/photo-1613143323062-8415c1fb9aa6?q=80&w=96&h=64&auto=format&fit=crop" alt="Flower Thumbnail" class="w-24 h-16 object-cover rounded-2xl grayscale contrast-125" />
            <div class="flex-1">
              <h4 class="text-sm font-medium text-white/90 mb-1">Advanced Plant Sculpting</h4>
              <p class="text-xs text-white/50">Modify geometries and genetic arrays.</p>
            </div>
            <button class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center group-hover:bg-white/20 transition-colors">
              <i data-lucide="plus" class="w-4 h-4 text-white/80"></i>
            </button>
          </div>
        </div>
      </section>
    </div>
  </main>
  
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
